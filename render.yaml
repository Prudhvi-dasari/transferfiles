services:
  - type: web
    name: transfernow-clone
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false # User will fill this in the Render dashboard
      - key: SUPABASE_KEY
        sync: false # User will fill this in the Render dashboard
      - key: SUPABASE_BUCKET
        value: transfers
